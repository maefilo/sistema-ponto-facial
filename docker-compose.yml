version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: facial-attendance-web
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    restart: always
    depends_on:
      - backend

  whatsapp-service:
    build: ./whatsapp-service
    container_name: whatsapp-attendance
    ports:
      - "3001:3001"
    volumes:
      - ./whatsapp-service/auth_info_baileys:/app/auth_info_baileys
    restart: always
    environment:
      - PORT=3001

  backend:
    build: ./backend
    container_name: facial-attendance-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    restart: always
    depends_on:
      - whatsapp-service
    environment:
      - TIDB_HOST=${TIDB_HOST}
      - TIDB_PORT=${TIDB_PORT}
      - TIDB_USER=${TIDB_USER}
      - TIDB_PASSWORD=${TIDB_PASSWORD}
      - TIDB_DB_NAME=${TIDB_DB_NAME}
      - CA_PATH=${CA_PATH}
      - WHATSAPP_SERVICE_URL=http://whatsapp-service:3001
      - API_HOST=0.0.0.0
      - API_PORT=8000
